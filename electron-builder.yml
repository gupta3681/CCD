appId: com.portico.app
productName: Portico
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - 'resources/**'
win:
  executableName: portico
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Portico accesses files you ask it to.
    - NSDownloadsFolderUsageDescription: Portico accesses files you ask it to.
  notarize: false
afterSign: build/after-sign.js
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: aryan
  category: Development
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# Distribution channel — when you have signing certs (Phase 2), uncomment the
# `publish` block below and `electron-builder --publish always` will upload
# signed artifacts to your GitHub Releases page. Keeps Phase 3 (auto-updates
# via electron-updater) wire-ready.
#
# publish:
#   provider: github
#   owner: <your-github-username>
#   repo: CCD
